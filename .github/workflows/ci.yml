name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      - name: Restore
        run: |
          dotnet restore src/Vendomat.Controller.Domain/Vendomat.Controller.Domain.csproj
          dotnet restore src/Vendomat.Controller.Application/Vendomat.Controller.Application.csproj
          dotnet restore src/Vendomat.Controller.Hardware/Vendomat.Controller.Hardware.csproj
          dotnet restore src/Vendomat.Controller.Cloud/Vendomat.Controller.Cloud.csproj
          dotnet restore tests/Vendomat.Controller.Domain.Tests/Vendomat.Controller.Domain.Tests.csproj
          dotnet restore tests/Vendomat.Controller.Application.Tests/Vendomat.Controller.Application.Tests.csproj
          dotnet restore tests/Vendomat.Controller.Cloud.Tests/Vendomat.Controller.Cloud.Tests.csproj

      - name: Build
        run: |
          dotnet build src/Vendomat.Controller.Domain/Vendomat.Controller.Domain.csproj --configuration Release --no-restore
          dotnet build src/Vendomat.Controller.Application/Vendomat.Controller.Application.csproj --configuration Release --no-restore
          dotnet build src/Vendomat.Controller.Hardware/Vendomat.Controller.Hardware.csproj --configuration Release --no-restore
          dotnet build src/Vendomat.Controller.Cloud/Vendomat.Controller.Cloud.csproj --configuration Release --no-restore

      - name: Test
        run: |
          dotnet test tests/Vendomat.Controller.Domain.Tests/Vendomat.Controller.Domain.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Vendomat.Controller.Application.Tests/Vendomat.Controller.Application.Tests.csproj --configuration Release --no-restore
          dotnet test tests/Vendomat.Controller.Cloud.Tests/Vendomat.Controller.Cloud.Tests.csproj --configuration Release --no-restore

      - name: Publish cloud artifact
        run: dotnet publish src/Vendomat.Controller.Cloud/Vendomat.Controller.Cloud.csproj --configuration Release --output artifacts/cloud

      - name: Upload cloud artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendomat-cloud
          path: artifacts/cloud
